name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'Dockerfile.*'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: swarmhaul-api
            dockerfile: Dockerfile.api
            build_args: ""
          - image: swarmhaul-dashboard
            dockerfile: Dockerfile.dashboard
            build_args: |
              VITE_API_URL=https://api.swarmhaul.defited.com
              VITE_WS_URL=wss://api.swarmhaul.defited.com
              VITE_SOLANA_RPC=https://api.devnet.solana.com
          - image: swarmhaul-agent
            dockerfile: Dockerfile.agent
            build_args: ""
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ORCA_REGISTRY || 'registry.meghsakha.com' }}
          username: ${{ secrets.ORCA_REGISTRY_USER }}
          password: ${{ secrets.ORCA_REGISTRY_TOKEN }}

      - name: Build + push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ secrets.ORCA_REGISTRY || 'registry.meghsakha.com' }}/${{ matrix.image }}:${{ github.sha }}
            ${{ secrets.ORCA_REGISTRY || 'registry.meghsakha.com' }}/${{ matrix.image }}:latest
          cache-from: type=registry,ref=${{ secrets.ORCA_REGISTRY || 'registry.meghsakha.com' }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ secrets.ORCA_REGISTRY || 'registry.meghsakha.com' }}/${{ matrix.image }}:buildcache,mode=max

  trigger-orca:
    name: Notify Orca
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: POST webhook
        env:
          WEBHOOK: ${{ secrets.ORCA_WEBHOOK_URL }}
          TOKEN: ${{ secrets.ORCA_WEBHOOK_TOKEN }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "ORCA_WEBHOOK_URL not set — skipping"
            exit 0
          fi
          curl -fsS -X POST "$WEBHOOK" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"${GITHUB_REPOSITORY}\",\"ref\":\"$REF\",\"sha\":\"$SHA\",\"images\":[\"swarmhaul-api\",\"swarmhaul-dashboard\",\"swarmhaul-agent\"]}"
