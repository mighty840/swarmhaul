name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: Typecheck + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate --schema=apps/api/src/db/schema.prisma

      - name: Typecheck + build
        run: bunx turbo run build --filter='!@swarmhaul/solana'

      - name: Unit tests with coverage
        run: bunx vitest run --coverage

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: apps/api/coverage/lcov.info,apps/agent/coverage/lcov.info
          flags: typescript
          fail_ci_if_error: false

      - name: Audit dependencies
        run: bun audit --audit-level=high || true

  anchor:
    name: Anchor Build + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/solana
    steps:
      - uses: actions/checkout@v4

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install 0.31.1
          avm use 0.31.1

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/solana

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.12

      - name: Install JS dependencies
        run: bun install

      - name: Anchor build
        run: anchor build

      - name: Anchor test
        run: anchor test

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
